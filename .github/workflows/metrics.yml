name: Metrics
on:
  schedule: [{cron: "0 0,12 * * *"}]
  workflow_dispatch: {}
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1. 宿主机安装字体，确保任何可能遗留的中文不会变成“豆腐块”导致崩溃
      - name: Install Fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk

      # 2. 回归官方标准的 Action 模式（不走纯 Docker），但通过极严格的参数过滤掉 CSDN 的干扰
      - name: Generate Custom Metrics
        uses: lowlighter/metrics@master
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: jax2730
          template: classic
          config_timezone: Asia/Shanghai
          plugins_errors_fatal: no

          # 💡 核心解门点一：在基础信息中，坚决剔除 metadata 和乱抓链接的组件
          # 仅保留 header（头像/名字）、activity（动态）、community（社区统计）、repositories（仓库）
          base: header, activity, community, repositories
          
          # 💡 核心解门点二：显式跳过对社交账号（CSDN 链接）的图表化渲染，直接绕过 Puppeteer 崩溃点
          base_skip: yes
          plugin_metadata: no

          # 🟢 模块 1：3D 立体贡献日历
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year

          # 🟢 模块 2：技术栈与编程语言详细分析
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%

          # 🟢 模块 3：星标项目展示
          plugin_stars: yes
          plugin_stars_limit: 4

          # 🟢 模块 4：编码作息习惯分析
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes

          # 💡 核心安全点三：关闭容易引发 Puppeteer 容器内报错的外部特殊 Emoji 库
          config_twemoji: no
          config_padding: 0, 5 + 11%
