name: Metrics
on:
  schedule: [{cron: "0 0,12 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: ghcr.io/lowlighter/metrics:master
      options: --user root
    steps:
      - name: Generate Custom Metrics via Docker Container
        # 💡 双重保险：不仅走环境变量，还在执行命令时显式作为参数或强行通过 node 读取
        run: |
          node /metrics/source/app/action/index.mjs
        env:
          # 💡 注意：部分旧版 Docker 镜像只识别全大写的 GITHUB_TOKEN 或 INPUT_TOKEN
          GITHUB_TOKEN: ${{ secrets.METRICS_TOKEN }}
          TOKEN: ${{ secrets.METRICS_TOKEN }}
          INPUT_TOKEN: ${{ secrets.METRICS_TOKEN }}
          
          # 基础配置
          USER: jax2730
          TEMPLATE: classic
          BASE: header, activity, community, repositories, metadata
          CONFIG_TIMEZONE: Asia/Shanghai
          PLUGINS_ERRORS_FATAL: "no"

          # 🟢 1. 3D 立体贡献日历
          PLUGIN_ISOCALENDAR: "yes"
          PLUGIN_ISOCALENDAR_DURATION: full-year

          # 🟢 2. 技术栈与编程语言详细分析
          PLUGIN_LANGUAGES: "yes"
          PLUGIN_LANGUAGES_ANALYSIS_TIMEOUT: "15"
          PLUGIN_LANGUAGES_CATEGORIES: markup, programming
          PLUGIN_LANGUAGES_COLORS: github
          PLUGIN_LANGUAGES_LIMIT: "8"
          PLUGIN_LANGUAGES_SECTIONS: most-used
          PLUGIN_LANGUAGES_THRESHOLD: "0%"

          # 🟢 3. 星标与高光项目展示
          PLUGIN_STARS: "yes"
          PLUGIN_STARS_LIMIT: "4"

          # 🟢 4. 编码作息习惯分析
          PLUGIN_HABITS: "yes"
          PLUGIN_HABITS_FROM: "200"
          PLUGIN_HABITS_DAYS: "14"
          PLUGIN_HABITS_FACTS: "yes"
          PLUGIN_HABITS_CHARTS: "yes"

          # 界面微调
          CONFIG_TWEMOJI: "yes"
          CONFIG_PADDING: 0, 5 + 11%
